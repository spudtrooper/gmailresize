<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gmail Resizer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px 16px;
        width: 260px;
      }
      h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }
      .size-buttons {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }
      .size-buttons button {
        flex: 1;
        padding: 8px 0;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f8f8f8;
      }
      .size-buttons button:hover:not(:disabled) {
        background: #e8e8e8;
      }
      .size-buttons button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      hr {
        border: none;
        border-top: 1px solid #eee;
        margin: 10px 0;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #555;
        min-height: 16px;
      }
      .status.error {
        color: #c62828;
      }
      .status.ok {
        color: #2e7d32;
      }
    </style>
  </head>
  <body>
    <h3>Set page size</h3>
    <div class="size-buttons">
      <button data-size="10">10</button>
      <button data-size="15">15</button>
      <button data-size="25">25</button>
      <button data-size="50">50</button>
      <button data-size="100">100</button>
    </div>
    <hr />
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
